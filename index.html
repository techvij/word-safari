<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />

    <title>Word Safari — A Word Adventure</title>
    <meta
      name="description"
      content="A kid-friendly word-guessing game (ages 6–12) themed around Asia. Cities, sports, animals, foods — words, facts, and pictures pulled live from Wikipedia."

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Word Safari — A Word Adventure" />

      property="og:description"
      content="A kid-friendly word-guessing game themed around Asia. Pick a category, pick a difficulty, and guess the word!"

    <meta property="og:image:width" content="1200" />

      name="twitter:description"
      content="A kid-friendly word-guessing game themed around Asia. Cities, sports, animals, foods."

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;700&display=swap"
