<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="60%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo tile -->
  <g transform="translate(420 130)">
    <rect width="120" height="120" rx="28" fill="url(#title)"/>
    <text x="60" y="74" font-size="84" text-anchor="middle" dominant-baseline="central">🌏</text>
  </g>

  <!-- Title -->
  <text x="600" y="370" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="120" font-weight="800" text-anchor="middle" fill="url(#title)">Word Safari</text>

  <!-- Subtitle -->
  <text x="600" y="430" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" letter-spacing="8" text-anchor="middle" fill="#475569" font-weight="600">— A WORD ADVENTURE —</text>

  <!-- Tag line -->
  <text x="600" y="510" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" text-anchor="middle" fill="#64748b">A kid-friendly word-guessing game, themed around Asia</text>

  <!-- Decorative emojis -->
  <g font-size="64">
    <text x="180" y="540">🐼</text>
    <text x="280" y="540">🍜</text>
    <text x="850" y="540">🏙️</text>
    <text x="950" y="540">🥋</text>
  </g>
</svg>
